<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a08"/>
      <stop offset="100%" stop-color="#1a1a17"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d4f03c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4f03c" stop-opacity="0"/>
    </radialGradient>
    <style>
      .display { font-family: 'Syne', sans-serif; font-weight: 800; }
      .serif { font-family: 'Instrument Serif', serif; font-style: italic; }
      .mono { font-family: 'DM Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Border accent -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#d4f03c" stroke-width="3"/>

  <!-- Top label -->
  <g transform="translate(80, 90)">
    <line x1="0" y1="11" x2="32" y2="11" stroke="#d4f03c" stroke-width="2"/>
    <text x="44" y="16" font-size="16" fill="#d4f03c" letter-spacing="2" class="mono">FULL STACK DEVELOPER · ABIDJAN, CI</text>
  </g>

  <!-- Name -->
  <text x="80" y="240" font-size="96" fill="#f0ede8" letter-spacing="-3" class="display">N'Guessan</text>
  <text x="80" y="350" font-size="120" fill="#d4f03c" letter-spacing="-4" class="serif">Marcel</text>
  <text x="80" y="450" font-size="96" fill="#f0ede8" letter-spacing="-3" class="display">DJEDJE-LI</text>

  <!-- Sub-line -->
  <text x="80" y="510" font-size="22" fill="#888880" class="mono">Head of Development · African Digit Consulting</text>

  <!-- Bottom right tech chips -->
  <g transform="translate(80, 560)" class="mono" font-size="14" fill="#888880">
    <text x="0" y="0">Laravel · React · Next.js · TanStack · Tailwind · TypeScript</text>
  </g>

  <!-- Decorative dot -->
  <circle cx="1100" cy="315" r="180" fill="none" stroke="#d4f03c" stroke-width="1" stroke-dasharray="3 6" opacity="0.5"/>
  <circle cx="1100" cy="315" r="100" fill="none" stroke="#d4f03c" stroke-width="1" opacity="0.3"/>
  <circle cx="1100" cy="315" r="60" fill="#d4f03c" opacity="0.15"/>

  <!-- Logo / Mark bottom-right -->
  <text x="1120" y="600" text-anchor="end" font-size="14" fill="#d4f03c" letter-spacing="2" class="mono">LeVraiMD_DEV</text>
</svg>
